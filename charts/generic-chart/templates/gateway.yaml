{{- range $key, $gw := .Values.gateways }}
{{- if $gw.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gw.name | default (printf "%s-%s" (include "generic-chart.fullname" $) $key) | quote }}
  namespace: {{ $.Release.Namespace }}
  {{- with $gw.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $gw.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- with $gw.spec }}
spec:
{{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}

{{- range $key, $rt := .Values.httpRoutes }}
{{- if $rt.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $rt.name | default (printf "%s-%s" (include "generic-chart.fullname" $) $key) | quote }}
  namespace: {{ $.Release.Namespace }}
  {{- with $rt.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $rt.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- with $rt.spec }}
spec:
{{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
