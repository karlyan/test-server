suite: hpa
templates:
  - hpa.yaml
release:
  name: my-release
  namespace: my-ns
tests:
  - it: should not render when autoscaling disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HPA pointing to deployment fullname
    set:
      autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: metadata.name
          value: my-release-generic-chart
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: my-release-generic-chart
      - equal:
          path: spec.minReplicas
          value: 1
      - equal:
          path: spec.maxReplicas
          value: 100

  - it: defaults render only cpu metric
    set:
      autoscaling.enabled: true
    asserts:
      - lengthEqual:
          path: spec.metrics
          count: 1
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 80

  - it: memory metric added when targetMemoryUtilizationPercentage set
    set:
      autoscaling.enabled: true
      autoscaling.targetMemoryUtilizationPercentage: 70
    asserts:
      - lengthEqual:
          path: spec.metrics
          count: 2
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 70

  - it: only memory metric when cpu disabled
    set:
      autoscaling.enabled: true
      autoscaling.targetCPUUtilizationPercentage: null
      autoscaling.targetMemoryUtilizationPercentage: 70
    asserts:
      - lengthEqual:
          path: spec.metrics
          count: 1
      - equal:
          path: spec.metrics[0].resource.name
          value: memory
