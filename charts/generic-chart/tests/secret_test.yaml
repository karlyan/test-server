suite: secret
templates:
  - secret.yaml
release:
  name: my-release
  namespace: my-ns
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Opaque Secret with fullname
    set:
      secret.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: my-release-generic-chart
      - equal:
          path: type
          value: Opaque

  - it: type override
    set:
      secret.enabled: true
      secret.type: kubernetes.io/tls
    asserts:
      - equal:
          path: type
          value: kubernetes.io/tls

  - it: data and stringData passthrough
    set:
      secret.enabled: true
      secret.data:
        token: dG9rZW4=
      secret.stringData:
        plain: hello
    asserts:
      - equal:
          path: data.token
          value: dG9rZW4=
      - equal:
          path: stringData.plain
          value: hello
